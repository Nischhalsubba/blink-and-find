name: Diagnose PR lint

on:
  push:
    branches:
      - agent/optimize-realtime-presence
    paths:
      - .github/workflows/diagnose-pr-lint.yml

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture lint output
        run: npm run lint > lint-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt
          retention-days: 1
