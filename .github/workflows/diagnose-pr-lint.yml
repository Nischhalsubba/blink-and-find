name: Diagnose PR lint

on:
  push:
    branches:
      - agent/optimize-realtime-presence
    paths:
      - .github/workflows/diagnose-pr-lint.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture lint output
        run: npm run lint > lint-output.txt 2>&1 || true
      - name: Post lint output to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 2 --body-file lint-output.txt
